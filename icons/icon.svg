<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0a0f"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#e8ff47" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>

  <!-- Running figure (stylised) -->
  <!-- Head -->
  <circle cx="310" cy="128" r="32" fill="#e8ff47"/>

  <!-- Body leaning forward -->
  <line x1="310" y1="160" x2="272" y2="270" stroke="#e8ff47" stroke-width="22" stroke-linecap="round"/>

  <!-- Back arm (trailing) -->
  <line x1="295" y1="195" x2="340" y2="240" stroke="#e8ff47" stroke-width="18" stroke-linecap="round"/>

  <!-- Front arm (driving forward) -->
  <line x1="290" y1="200" x2="230" y2="175" stroke="#e8ff47" stroke-width="18" stroke-linecap="round"/>

  <!-- Front leg (driving forward and up) -->
  <line x1="272" y1="270" x2="210" y2="330" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <line x1="210" y1="330" x2="175" y2="295" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>

  <!-- Back leg (pushing off) -->
  <line x1="272" y1="270" x2="320" y2="350" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <line x1="320" y1="350" x2="370" y2="360" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>

  <!-- Ground line / speed lines -->
  <line x1="80" y1="400" x2="200" y2="400" stroke="#e8ff47" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="422" x2="160" y2="422" stroke="#e8ff47" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- STRIDE wordmark at bottom -->
  <text x="256" y="478" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#e8ff47" text-anchor="middle" letter-spacing="8">STRIDE</text>
</svg>
